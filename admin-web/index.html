<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1565c0" />
  <title>МедКоннект — Панель управления</title>
  <link rel="stylesheet" href="/panel/css/app.css" />
</head>
<body>

  <div id="login-page" class="login-page">
    <div class="login-card">
      <h1>МедКоннект</h1>
      <p>Панель врача / администратора</p>
      <div id="login-error" class="error-msg hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input id="login-input" type="email" value="doctor@test.ru" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input id="password-input" type="password" value="doctor123" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>
      <p class="hint" style="margin-top:16px">
        <strong>Только для врачей и администраторов.</strong><br />
        Пациенты: <a href="/download/" style="color:#1565c0">скачать приложение</a><br /><br />
        Врач: doctor@test.ru / doctor123<br />
        Админ: admin@test.ru / admin123
      </p>
    </div>
  </div>

  <div id="app-layout" class="app-layout hidden">
    <header class="topbar">
      <button id="topbar-back" class="topbar-back hidden" aria-label="Назад">←</button>
      <div class="topbar-title" id="page-title">МедКоннект</div>
      <div class="topbar-user">
        <div id="user-name">—</div>
        <div id="user-role" class="role-badge">—</div>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h2>МедКоннект</h2>
        </div>
        <nav id="sidebar-nav"></nav>
        <button id="logout-btn" class="nav-item logout-btn">Выйти</button>
      </aside>

      <main class="main-content">
        <div id="list-view">
          <div id="appointments-section">
            <div id="cards-list" class="cards-list"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr id="table-head-row">
                    <th>Пациент</th><th>Дата</th><th>Статус</th><th></th>
                  </tr>
                </thead>
                <tbody id="appointments-table-body"></tbody>
              </table>
            </div>
          </div>
          <div id="schedule-section" class="hidden"></div>
          <div id="reports-section" class="hidden"></div>
        </div>
        <div id="detail-view" class="hidden">
          <div id="detail-content"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="/panel/js/api.js"></script>
  <script src="/panel/js/app.js"></script>
</body>
</html>
