services:
  db:
    image: postgres:16-alpine
    container_name: telemedicine-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telemed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telemed123}
      POSTGRES_DB: ${POSTGRES_DB:-telemedicine}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemed -d telemedicine"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: telemedicine-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-telemed}:${POSTGRES_PASSWORD:-telemed123}@db:5432/${POSTGRES_DB:-telemedicine}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      UPLOAD_DIR: uploads
      ADMIN_PANEL_DIR: /app/admin-web
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
      - ./admin-web:/app/admin-web:ro
      - ./download-web:/app/download-web:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
